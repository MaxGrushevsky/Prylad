<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Logo and title side by side, centered -->
  <g transform="translate(600, 315)">
    <!-- Logo - three overlapping circles -->
    <g transform="translate(-280, -50)">
      <circle cx="0" cy="0" r="50" fill="white" opacity="0.9"/>
      <circle cx="70" cy="0" r="50" fill="white" opacity="0.7"/>
      <circle cx="35" cy="70" r="50" fill="white" opacity="0.8"/>
    </g>
    
    <!-- Title - bold, next to logo -->
    <text x="-80" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="130" font-weight="700" fill="white">
      Prylad
    </text>
  </g>
</svg>
